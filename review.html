<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点评 - 何炜坤</title>

<style>

/* ================= */
/* mobile adjustment */
/* ================= */

@media (max-width:700px){

/* 调整蒙德里安线条 */

body::before{
left:6%;
opacity:0.03;
}

.mobile-bubble{
opacity:0.25;
}

}


/* bubbles */

.bubble-bg{
position:fixed;
border-radius:60% 40% 50% 50% / 50% 60% 40% 50%;
pointer-events:none;
z-index:0;
animation:float 18s infinite ease-in-out,
morph 14s infinite ease-in-out;
}

/* animations */

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-12px);}
100%{transform:translateY(0px);}
}

@keyframes morph{

0%{border-radius:60% 40% 55% 45% / 45% 55% 40% 60%;}
25%{border-radius:50% 60% 40% 60% / 60% 40% 60% 40%;}
50%{border-radius:55% 45% 65% 35% / 40% 60% 50% 50%;}
75%{border-radius:65% 35% 50% 50% / 55% 45% 65% 35%;}
100%{border-radius:60% 40% 55% 45% / 45% 55% 40% 60%;}

}




*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  background:#ffffff;
  color:#111;
  line-height:1.6;
}

/* ===== NAVIGATION ===== */
nav{
  width:100%;
  display:flex;
  justify-content:center;
  padding:20px 0;
  border-bottom:3px solid black;
  background:#fff;
  position:sticky;
  top:0;
  z-index:10;
}

nav ul{
  list-style:none;
  display:flex;
  gap:40px;
  margin:0;
  padding:0;
}

nav li{
  position:relative;
}

nav a{
  text-decoration:none;
  color:#111;
  font-size:15px;
  padding-bottom:6px;
}

/* Mondrian color accents */
nav li:nth-child(1) a{border-bottom:4px solid #e63946}
nav li:nth-child(2) a{border-bottom:4px solid #3a86ff}
nav li:nth-child(3) a{border-bottom:4px solid #ffbe0b}
nav li:nth-child(4) a{border-bottom:4px solid #000}

nav a:hover{opacity:0.6}

/* ===== BLOG LIST ===== */
.blog-list{
  max-width:720px;
  margin:50px auto;
  padding:0 20px;
}

.blog-list h1{
  font-size:28px;
  margin-bottom:30px;
  text-align:center;
}

.blog-item{
  padding:16px 0;
  border-bottom:2px solid #eee;
  font-size:16px;
}

.blog-item span{
  color:#888;
  margin-right:10px;
  font-size:14px;
}

.blog-item a{
  text-decoration:none;
  color:#111;
}

.blog-item a:hover{text-decoration:underline}

/* ===== FOOTER ===== */
footer{
  margin-top:70px;
  padding:30px 20px;
  text-align:center;
  font-size:14px;
  color:#666;
  border-top:2px solid #eee;
}

footer a{
  color:#333;
  text-decoration:none;
  margin:0 8px;
}

footer a:hover{text-decoration:underline}

/* subtle vertical Mondrian line */
body::before{
  content:"";
  position:fixed;
  left:18%;
  top:0;
  width:3px;
  height:100%;
  background:black;
  opacity:0.05;
  pointer-events:none;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
<ul>
<li><a href="https://heweikun.com">主页</a></li>
<li><a href="https://heweikun.com/photo.html">摄影</a></li>
<li><a href="https://heweikun.com/blog.html">博客</a></li>
<li><a href="https://heweikun.com/review.html">点评</a></li>
</ul>
</nav>

<!-- BLOG LIST -->
<section class="blog-list">

<h1>点评</h1>

<div class="blog-item">
<span>2026.03.15</span>
<a href="https://heweikun.com/review/review1.html">测试</a>
</div>

</section>

<footer>
© 2026 Walter He.
</footer>




<script>

const colors=[
"rgba(230,57,70,0.35)",
"rgba(58,134,255,0.35)",
"rgba(255,190,11,0.35)"
];

/* 页面高度 */

const pageHeight=document.body.scrollHeight;

/* 每隔多少px放一行泡泡 */

const spacing=300;

const rows=Math.ceil(pageHeight/spacing);

/* 左右位置（vw） */

const leftMin=5;
const leftMax=20;

const rightMin=70;
const rightMax=90;

for(let i=0;i<rows;i++){

const y=i*spacing+Math.random()*120;

/* 左侧 */

const leftBubble=document.createElement("div");

leftBubble.className="bubble-bg";

const size=70+Math.random()*80;

leftBubble.style.width=size+"px";
leftBubble.style.height=size+"px";

leftBubble.style.left=(leftMin+Math.random()*(leftMax-leftMin))+"vw";
leftBubble.style.top=y+"px";

leftBubble.style.background=
colors[Math.floor(Math.random()*colors.length)];

leftBubble.style.animationDuration=
(14+Math.random()*10)+"s";

document.body.appendChild(leftBubble);

/* 右侧 */

const rightBubble=document.createElement("div");

rightBubble.className="bubble-bg";

const size2=70+Math.random()*80;

rightBubble.style.width=size2+"px";
rightBubble.style.height=size2+"px";

rightBubble.style.left=(rightMin+Math.random()*(rightMax-rightMin))+"vw";
rightBubble.style.top=(y+Math.random()*80)+"px";

rightBubble.style.background=
colors[Math.floor(Math.random()*colors.length)];

rightBubble.style.animationDuration=
(14+Math.random()*10)+"s";

document.body.appendChild(rightBubble);

}




/* ================= */
/* mobile bubbles */
/* ================= */

if(window.innerWidth <= 700){

const mobileColors=[
"rgba(230,57,70,0.25)",  // 红
"rgba(58,134,255,0.25)", // 蓝
"rgba(255,190,11,0.25)"  // 黄
];

const pageHeight=document.body.scrollHeight;

/* 每行高度 */
const rowHeight = 250;

/* 行数 */
const rows = Math.ceil(pageHeight / rowHeight);

for(let r=0;r<rows;r++){

    /* 每行1-2个泡泡 */
    const count = 1 + Math.floor(Math.random()*2);

    for(let i=0;i<count;i++){

        const bubble=document.createElement("div");
        bubble.className="bubble-bg mobile-bubble";

        const size=60+Math.random()*60;

        bubble.style.width=size+"px";
        bubble.style.height=size+"px";

        let left;

        /* 随机决定左边还是右边 */
        const side = Math.random() < 0.5 ? "left" : "right";

        if(side==="left"){
            left = 0 + Math.random()*10;   // 左侧区域
        }else{
            left = 90 + Math.random()*10;  // 右侧区域
        }

        const top =
        r*rowHeight + rowHeight/2 + (Math.random()*80-40);

        bubble.style.left = (left-10) + "vw";
        bubble.style.top = top + "px";

        bubble.style.background =
        mobileColors[Math.floor(Math.random()*mobileColors.length)];

        bubble.style.animationDuration =
        (16+Math.random()*8)+"s";

        bubble.style.opacity="0.25";

        document.body.appendChild(bubble);

    }

}

}






</script>








</body>
</html>
