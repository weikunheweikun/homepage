<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测试 - 何炜坤</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  background:#ffffff;
  color:#111;
  line-height:1.6;
}

/* ===== NAVIGATION ===== */
nav{
  width:100%;
  display:flex;
  justify-content:center;
  padding:20px 0;
  border-bottom:3px solid black;
  background:#fff;
  position:sticky;
  top:0;
  z-index:10;
}

nav ul{
  list-style:none;
  display:flex;
  gap:40px;
  margin:0;
  padding:0;
}

nav li{
  position:relative;
}

nav a{
  text-decoration:none;
  color:#111;
  font-size:15px;
  padding-bottom:6px;
}

/* Mondrian color accents */
nav li:nth-child(1) a{border-bottom:4px solid #e63946}
nav li:nth-child(2) a{border-bottom:4px solid #3a86ff}
nav li:nth-child(3) a{border-bottom:4px solid #ffbe0b}
nav li:nth-child(4) a{border-bottom:4px solid #000}

nav a:hover{opacity:0.6}

/* ===== ARTICLE CONTENT ===== */
.article-container{
  max-width:720px;
  margin:50px auto;
  padding:0 20px;
}

.article-container h1{
  font-size:28px;
  margin-bottom:20px;
  text-align:left;
}

.article-container .content{
  font-size:16px;
  color:#333;
}

.article-container .content p{
  margin-bottom:18px;
  line-height:1.8;
}

/* ===== FOOTER ===== */
footer{
  margin-top:70px;
  padding:30px 20px;
  text-align:center;
  font-size:14px;
  color:#666;
  border-top:2px solid #eee;
}

footer a{
  color:#333;
  text-decoration:none;
  margin:0 8px;
}

footer a:hover{text-decoration:underline}

/* subtle vertical Mondrian line */
body::before{
  content:"";
  position:fixed;
  left:18%;
  top:0;
  width:3px;
  height:100%;
  background:black;
  opacity:0.05;
  pointer-events:none;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<ul>
<li><a href="https://heweikun.com">主页</a></li>
<li><a href="https://heweikun.com/photo.html">摄影</a></li>
<li><a href="https://heweikun.com/blog.html">博客</a></li>
<li><a href="https://heweikun.com/review.html">点评</a></li>
</ul>
</nav>

<!-- ARTICLE CONTENT -->
<section class="article-container">
  <h1>测试</h1>
  <div class="content">
    <p>blablabla</p>
  </div>
</section>

<!-- FOOTER -->
<footer>
© 2026 Walter He.
</footer>

</body>
</html>
