<title>何炜坤</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:"Helvetica Neue",Arial,sans-serif;
background:#e63946;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
}

/* Desktop background bubbles */

.bg-bubble{
position:absolute;
border-radius:60% 40% 50% 50% / 50% 60% 40% 50%;
opacity:0.35;
filter:blur(2px);
animation:float 20s infinite ease-in-out, morph 10s infinite ease-in-out;
}

.bg1{width:220px;height:220px;background:#ffe66d;top:10%;left:8%;}
.bg2{width:180px;height:180px;background:#1d3557;bottom:12%;right:12%;}
.bg3{width:140px;height:140px;background:#ff6b6b;top:70%;left:18%;}
.bg4{width:120px;height:120px;background:#ffd166;top:25%;right:18%;}
.bg5{width:160px;height:160px;background:#457b9d;bottom:18%;left:12%;}
.bg6{width:90px;height:90px;background:#f1faee;top:55%;right:28%;}

/* Container */

.container{
width:900px;
max-width:92vw;
padding:50px 40px;
background:#ffffff;
border-radius:60% 40% 55% 45% / 45% 55% 40% 60%;
box-shadow:0 40px 90px rgba(0,0,0,0.25);
animation:float 14s ease-in-out infinite, morph 12s ease-in-out infinite;
position:relative;
z-index:10;
}

header{text-align:center;margin-bottom:40px;}

header h1{
font-size:2.6rem;
margin-bottom:8px;
}

header p{color:#555;}

/* Navigation */

.nav{
display:flex;
justify-content:center;
gap:35px;
flex-wrap:wrap;
margin-bottom:40px;
}

.bubble{
width:150px;
height:150px;
border-radius:60% 40% 55% 45% / 45% 55% 40% 60%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
text-align:center;
transition:transform .35s ease, box-shadow .35s ease;
animation:float 12s infinite ease-in-out, morph 8s infinite ease-in-out;
}

.bubble:hover{
transform:scale(1.08);
box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

.thought{background:#1d3557;}
.history{background:#ff6b6b;}
.life{background:#ffd166;color:#222;}

/* Updates */

.updates{
padding:30px;
border-radius:55% 45% 60% 40% / 50% 60% 40% 50%;
background:#f1faee;
animation:float 16s ease-in-out infinite, morph 10s infinite ease-in-out;
max-width:420px;
margin:0 auto;
text-align:center;
}

.updates h2{margin-bottom:14px;}

.updates ul{
list-style:none;
margin-top:10px;
}

.updates li{margin:10px 0;}

.updates a{
text-decoration:none;
color:#333;
font-weight:500;
}

/* Animations */

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0px);}
}

@keyframes morph{
0%{border-radius:60% 40% 55% 45% / 45% 55% 40% 60%;}
25%{border-radius:50% 60% 40% 60% / 60% 40% 60% 40%;}
50%{border-radius:55% 45% 65% 35% / 40% 60% 50% 50%;}
75%{border-radius:65% 35% 50% 50% / 55% 45% 65% 35%;}
100%{border-radius:60% 40% 55% 45% / 45% 55% 40% 60%;}
}

/* ================= */
/* MOBILE VERSION */
/* ================= */

@media (max-width:700px){

body{
align-items:flex-start;
padding-top:80px;
}

/* remove white container */

.container{
background:transparent;
box-shadow:none;
animation:none;
padding:0;
}


/* layout */

.nav{
position:relative;
width:320px;
height:340px;
margin:0 auto 40px auto;
}

/* bubble base */

.bubble{
position:absolute;
width:120px;
height:120px;
font-size:16px;
}

/* centered top bubble */

.thought{
top:0;
left:100px;
background:#1d3557;
}

/* bottom left */

.history{
top:120px;
left:0;
background:#ffd166;
color:#222;
}

/* bottom right */

.life{
top:120px;
right:0;
background:#457b9d;
}

/* updates bubble bottom */

.updates{
position:absolute;
top:400px;
left:30%;
transform:translateX(-50%);
width:200px;
padding:20px;
background:#f1faee;
animation:float 16s ease-in-out infinite, morph 10s infinite ease-in-out;
}

header h1{
font-size:2rem;
color:#f1faee;
}

header p{
color:#f1faee;
}

}
